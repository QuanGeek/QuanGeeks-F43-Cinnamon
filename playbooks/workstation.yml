---
- name: Provision Fedora Cinnamon sysadmin workstation
  hosts: localhost
  become: true
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Confirm Fedora family
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] == 'RedHat'
        fail_msg: "This playbook is built for Fedora/RHEL-like systems."

    - name: Upgrade existing packages
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true

    - name: Enable RPM Fusion free repo
      ansible.builtin.dnf:
        name: "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
        state: present
        disable_gpg_check: true
      ignore_errors: true

    - name: Enable RPM Fusion nonfree repo
      ansible.builtin.dnf:
        name: "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
        state: present
        disable_gpg_check: true
      ignore_errors: true

    - name: Add Brave browser repository
      ansible.builtin.yum_repository:
        name: brave-browser
        description: Brave Browser
        baseurl: https://brave-browser-rpm-release.s3.brave.com/$basearch
        enabled: true
        gpgcheck: true
        gpgkey: https://brave-browser-rpm-release.s3.brave.com/brave-core.asc

    - name: Add Google Chrome repository
      ansible.builtin.yum_repository:
        name: google-chrome
        description: Google Chrome
        baseurl: https://dl.google.com/linux/chrome/rpm/stable/$basearch
        enabled: true
        gpgcheck: true
        gpgkey: https://dl.google.com/linux/linux_signing_key.pub

    - name: Add Slack repository
      ansible.builtin.yum_repository:
        name: slack
        description: Slack
        baseurl: https://packagecloud.io/slacktechnologies/slack/fedora/21/$basearch
        enabled: true
        gpgcheck: false
        repo_gpgcheck: false
        sslverify: true

tasks:

  - name: Set system hostname
    ansible.builtin.hostname:
      name: "{{ system_hostname }}"

  - name: Update /etc/hosts
    ansible.builtin.lineinfile:
      path: /etc/hosts
      regexp: '^127\.0\.1\.1'
      line: "127.0.1.1 {{ system_hostname }}"
      state: present

  - name: Install Fedora workstation packages
    ansible.builtin.dnf:
      name: "{{ fedora_packages }}"
      state: present
      skip_broken: true
    register: package_install

  - name: Add user to virtualization groups
    ansible.builtin.user:
      name: "{{ workstation_user }}"
      groups: libvirt,kvm
      append: true

  - name: Ensure Flatpak remote exists
    community.general.flatpak_remote:
      name: flathub
      state: present
      flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

  - name: Install Flatpak apps
    community.general.flatpak:
      name: "{{ item }}"
      state: present
      remote: flathub
    loop: "{{ flatpak_packages }}"

  - name: Enable recommended services
    ansible.builtin.systemd:
      name: "{{ item }}"
      enabled: true
      state: started
    loop: "{{ services_enabled }}"
    ignore_errors: true

  - name: Disable security-sensitive services not needed by default
    ansible.builtin.systemd:
      name: "{{ item }}"
      enabled: false
      state: stopped
    loop: "{{ services_disabled_security }}"
    ignore_errors: true

  - name: Cleanup - disable overlapping virtualization services
    ansible.builtin.systemd:
      name: "{{ item }}"
      enabled: false
      state: stopped
    loop: "{{ services_disabled_cleanup }}"
    when: cleanup_virtualization_overlap | bool
    ignore_errors: true

  - name: Cleanup - remove overlapping virtualization packages
    ansible.builtin.dnf:
      name: "{{ remove_virtualization_overlap_packages }}"
      state: absent
    when: cleanup_virtualization_overlap | bool
    ignore_errors: true

  - name: Ensure wallpaper directory exists
    ansible.builtin.file:
      path: "{{ wallpaper_dir }}"
      state: directory
      owner: "{{ workstation_user }}"
      group: "{{ workstation_user }}"
      mode: "0755"

  - name: Copy wallpaper to workstation
    ansible.builtin.copy:
      src: "../wallpapers/{{ wallpaper_file }}"
      dest: "{{ wallpaper_source_path }}"
      owner: "{{ workstation_user }}"
      group: "{{ workstation_user }}"
      mode: '0644'

  - name: Set Cinnamon wallpaper
    become: false
    ansible.builtin.shell: |
      gsettings set org.cinnamon.desktop.background picture-uri "file://{{ wallpaper_source_path | replace(' ', '%20') }}"
      gsettings set org.cinnamon.desktop.background picture-uri-dark "file://{{ wallpaper_source_path | replace(' ', '%20') }}"
      gsettings set org.cinnamon.desktop.background picture-options 'zoom'
    environment:
      HOME: "{{ workstation_home }}"
    changed_when: true

    - name: Set Cinnamon panel position
      become: false
      ansible.builtin.shell: |
        gsettings set org.cinnamon panels-enabled "['1:0:top']"
      environment:
        HOME: "{{ workstation_home }}"
      changed_when: true

  - name: Ensure Terminator config directory exists
    ansible.builtin.file:
      path: "{{ workstation_home }}/.config/terminator"
      state: directory
      owner: "{{ workstation_user }}"
      group: "{{ workstation_user }}"
      mode: "0755"

  - name: Deploy Terminator config
    ansible.builtin.copy:
      src: ../files/terminator-config
      dest: "{{ workstation_home }}/.config/terminator/config"
      owner: "{{ workstation_user }}"
      group: "{{ workstation_user }}"
      mode: "0644"

  - name: Restore Cinnamon desktop settings
    become: false
    ansible.builtin.shell: |
      dbus-run-session dconf load /org/cinnamon/ < "{{ playbook_dir }}/../files/cinnamon-current.conf"
    args:
      executable: /bin/bash
    environment:
      HOME: "{{ workstation_home }}"
    changed_when: true

  - name: Configure firewall default zone
    ansible.posix.firewalld:
      zone: FedoraWorkstation
      state: enabled
      permanent: true
      immediate: true
    ignore_errors: true

  - name: Print next steps
    ansible.builtin.debug:
      msg:
        - "Provisioning complete. Reboot recommended."
        - "Log out/in for libvirt/kvm group membership to take effect."
        - "If this is a physical laptop, keep cleanup_virtualization_overlap=true. If this is a VM, set it false before running."
